<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>AI MATA VISION V2</title>
  <style>
    body { text-align: center; background: #111; color: #fff; font-family: sans-serif; }
    video { width: 90%; max-width: 600px; border: 3px solid #00ff88; border-radius: 12px; }
    #result { font-size: 20px; margin-top: 15px; color: #00ff88; }
   .center-box { position: absolute; width: 200px; height: 200px; border: 2px dashed yellow; top: 50%; left: 50%; transform: translate(-50%,-50%); }
    button { padding: 10px 20px; margin: 10px; background: #00ff88; border: none; border-radius: 8px; color: #111; font-weight: bold; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>
  <h1>👁️ AI MATA VISION V2</h1>
  <button onclick="toggleTorch()">💡 Nyalain Senter</button>
  <div style="position:relative; display:inline-block;">
    <video id="video" autoplay muted playsinline></video>
    <div class="center-box"></div>
  </div>
  <div id="result">Memuat AI... Tunggu 10 detik</div>

  <script>
    const video = document.getElementById('video');
    const result = document.getElementById('result');
    let model, stream, track;
    let lastSpoken = "";

    async function setupCamera() {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
      });
      video.srcObject = stream;
      track = stream.getVideoTracks()[0];
      return new Promise(resolve => video.onloadedmetadata = resolve);
    }

    function toggleTorch() {
      if (track && track.getCapabilities().torch) {
        track.applyConstraints({ advanced: [{torch: true}] });
      } else {
        alert("HP kamu ga support senter otomatis bro");
      }
    }

    function speak(text) {
      if (text === lastSpoken) return;
      lastSpoken = text;
      const speech = new SpeechSynthesisUtterance(text);
      speech.lang = 'id-ID';
      window.speechSynthesis.speak(speech);
    }

    async function detect() {
      const predictions = await model.detect(video);
      if (predictions.length > 0) {
        const obj = predictions[0];
        const name = obj.class;
        const score = (obj.score * 100).toFixed(0);
        result.innerText = `Terdeteksi: ${name} - Akurasi: ${score}%`;
        speak(`Terdeteksi ${name}`);
      } else {
        result.innerText = "Arahkan ke benda, hewan, atau tumbuhan";
      }
    }

    async function main() {
      await setupCamera();
      result.innerText = "Download AI... 10 detik";
      model = await cocoSsd.load();
      result.innerText = "AI Siap. Arahkan Kamera";
      setInterval(detect, 2000);
    }
    main();
  </script>
</body>
</html>
