<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI MATA VISION</title>
  <meta name="theme-color" content="#00ff88">
  
  <link rel="manifest" href="manifest.json">
<link rel="icon" href="logo-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    body { text-align: center; background: #000; color: #fff; font-family: sans-serif; margin:0; padding: 20px; }
    .logo { width: 80px; height: 80px; margin: 10px auto; background: #00ff88; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
    .frame { border: 3px solid #00ff88; border-radius: 20px; padding: 15px; display: inline-block; background: #111; }
    video { width: 90%; max-width: 600px; border-radius: 12px; }
    #result { font-size: 24px; margin-top: 20px; color: #00ff88; font-weight: bold; }
    button { padding: 14px 24px; margin: 10px; background: #00ff88; border: none; border-radius: 12px; color: #000; font-weight: bold; font-size: 16px; }
    button.mati { background: #ff4444; color: #fff; }
    #installBtn { display: none; background: #0088ff; color: #fff; } /* tombol instal disembunyiin dulu */
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>
  <div class="logo">👁️</div>
  <h1>AI MATA VISION</h1>
  <button id="installBtn">📲 Instal Aplikasi</button>

  <p>Arahkan kamera ke Benda, Hewan, atau Tumbuhan</p>
  <button id="btnSenter" onclick="toggleTorch()">💡 Nyalain Senter</button>
  <div class="frame"><video id="video" autoplay muted playsinline></video></div>
  <div id="result">Memuat AI... Tunggu 10 detik</div>

<script>
    const video = document.getElementById('video');
    const result = document.getElementById('result');
    const btnSenter = document.getElementById('btnSenter');
    let model, stream, track;
    let lastSpoken = "";
    let senterNyala = false;

    const kamusID = {
      "person": "orang", "dog": "anjing", "cat": "kucing", "bird": "burung",
      "car": "mobil", "motorcycle": "motor", "bottle": "botol", "chair": "kursi",
      "table": "meja", "cell phone": "hp", "laptop": "laptop", "book": "buku",
      "potted plant": "tanaman", "tv": "tv", "cup": "gelas"
    };
    function terjemahkan(nama) { return kamusID[nama] || nama; }

    async function setupCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        track = stream.getVideoTracks()[0];
        result.innerText = "Kamera Aktif. Arahkan ke objek";
        return new Promise(resolve => video.onloadedmetadata = resolve);
      } catch(err) {
        result.innerText = "GAGAL BUKA KAMERA";
        alert("Izinkan akses kamera dulu bro");
      }
    }

    async function toggleTorch() {
      if (!track ||!track.getCapabilities().torch) { alert("Senter otomatis ga support di HP ini"); return; }
      senterNyala =!senterNyala;
      await track.applyConstraints({ advanced: [{ torch: senterNyala }] });
      btnSenter.innerText = senterNyala? "💡 Matikan Senter" : "💡 Nyalain Senter";
      btnSenter.classList.toggle("mati");
    }

    function speak(text) {
      if (text === lastSpoken) return;
      lastSpoken = text;
      const speech = new SpeechSynthesisUtterance(text);
      speech.lang = 'id-ID';
      window.speechSynthesis.speak(speech);
    }

    async function detect() {
      const predictions = await model.detect(video);
      if (predictions.length > 0) {
        const namaID = terjemahkan(predictions[0].class);
        result.innerText = `Terdeteksi: ${namaID}`;
        speak(`Terdeteksi ${namaID}`);
      } else { result.innerText = "Tidak ada objek terdeteksi"; }
    }

    async function main() {
      await setupCamera();
      model = await cocoSsd.load();
      result.innerText = "AI Siap. Arahkan Kamera";
      setInterval(detect, 2000);
    }
    main();

  let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'block'; // munculin tombol biru
  console.log("PWA siap diinstal");
});

installBtn.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') installBtn.style.display = 'none';
    deferredPrompt = null;
  } else {
    alert("Cara manual: Titik 3 Chrome > Instal aplikasi");
  }
});

// DAFTAR SERVICE WORKER - INI WAJIB
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
  .then(() => console.log('SW terdaftar'));
}
</script>
</body>
</html>
