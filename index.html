<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>AI MATA VISION ID</title>
  <link rel="manifest" href="manifest.json">
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
  <style>
    body { text-align: center; background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
    video { width: 90%; max-width: 600px; border: 3px solid #00ff88; border-radius: 12px; }
    #result { font-size: 24px; margin-top: 20px; color: #00ff88; font-weight: bold; }
    button { padding: 12px 20px; margin: 10px; background: #00ff88; border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 16px; }
    button.mati { background: #ff4444; color: #fff; } /* tombol pas senter mati */
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>
  <h1>👁️ AI MATA VISION</h1>
  <p>Arahkan kamera ke Benda, Hewan, atau Tumbuhan</p>
  <button id="btnSenter" onclick="toggleTorch()">💡 Nyalain Senter</button>
  <div>
    <video id="video" autoplay muted playsinline></video>
  </div>
  <div id="result">Memuat AI... Tunggu 10 detik</div>

  <script>
    const video = document.getElementById('video');
    const result = document.getElementById('result');
    const btnSenter = document.getElementById('btnSenter');
    let model, stream, track;
    let lastSpoken = "";
    let senterNyala = false; // status senter

    const kamusID = {
      "person": "orang", "bicycle": "sepeda", "car": "mobil", "motorcycle": "motor",
      "dog": "anjing", "cat": "kucing", "bird": "burung", "bottle": "botol",
      "chair": "kursi", "table": "meja", "cell phone": "hp", "laptop": "laptop",
      "book": "buku", "potted plant": "tanaman", "tv": "tv", "cup": "gelas"
    };

    function terjemahkan(nama) {
      return kamusID[nama] || nama;
    }

    async function setupCamera() {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
      });
      video.srcObject = stream;
      track = stream.getVideoTracks()[0];
      return new Promise(resolve => video.onloadedmetadata = resolve);
    }

    async function toggleTorch() {
      if (!track ||!track.getCapabilities().torch) {
        alert("HP kamu ga support senter otomatis bro");
        return;
      }

      senterNyala =!senterNyala; // bolak balik true/false

      await track.applyConstraints({
        advanced: [{ torch: senterNyala }]
      });

      // Ganti tulisan tombol
      if (senterNyala) {
        btnSenter.innerText = "💡 Matikan Senter";
        btnSenter.classList.add("mati");
      } else {
        btnSenter.innerText = "💡 Nyalain Senter";
        btnSenter.classList.remove("mati");
      }
    }

    function speak(text) {
      if (text === lastSpoken) return;
      lastSpoken = text;
      const speech = new SpeechSynthesisUtterance(text);
      speech.lang = 'id-ID';
      speech.rate = 0.9;
      window.speechSynthesis.speak(speech);
    }

    async function detect() {
      const predictions = await model.detect(video);
      if (predictions.length > 0) {
        const obj = predictions[0];
        const namaID = terjemahkan(obj.class);
        const score = (obj.score * 100).toFixed(0);
        result.innerText = `Terdeteksi: ${namaID} - Akurasi: ${score}%`;
        speak(`Terdeteksi ${namaID}`);
      } else {
        result.innerText = "Tidak ada objek terdeteksi";
      }
    }

    async function main() {
      await setupCamera();
      result.innerText = "Download AI... Mohon tunggu";
      model = await cocoSsd.load();
      result.innerText = "AI Siap. Arahkan Kamera";
      setInterval(detect, 2000);
    }
    main();
  </script>
</body>
</html>
